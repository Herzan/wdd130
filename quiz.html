<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<header>
    <img src="images/R.png" width="70" alt="Rafting Company Logo">

</header>


    <h1>Quiz Form</h1>
    <form id="quizForm">
        <div class="question">
            <label for="q1">Fill in the blank: What does HTML stand for?</label>
            <input type="text" id="q1" name="q1" required>
        </div>
        <div class="question">
            <label for="q2">Explain briefly the purpose of CSS:</label>
            <textarea id="q2" name="q2" rows="4" required></textarea>
        </div>
        <div class="question">
            <label for="q3">What is the correct syntax to link an external CSS file?</label>
            <select id="q3" name="q3" required>
                <option value="" selected disabled>Choose One ...</option>
                <option value="1">link rel="stylesheet" href="styles.css"</option>
                <option value="2">stylesheet rel="link" href="styles.css"</option>
                <option value="3">link type="text/css" rel="stylesheet" href="styles.css"</option>
            </select>
        </div>
        <div class="question">
            <label for="q4">How many heading levels are available in HTML?</label>
            <input type="number" id="q4" name="q4" min="1" max="6" required>
        </div>
        <button type="submit">Submit Quiz</button>
    </form>

</html>
